syntax = "proto3";

option csharp_namespace = "WordleGameServer.Protos";

service WordleServer{
	rpc Play(stream GuessRequest) returns (stream GuessResponse);
	rpc GetStats(Empty) returns (StatResponse);
}
message Empty {}
message GuessRequest {
	string word = 1;
}
message StatResponse {
	uint32 Players = 1;
	float Winners = 2;
    uint32 one = 3;
	uint32 two = 4;
	uint32 three = 5;
	uint32 four = 6;
	uint32 five = 7;
	uint32 six = 8;
}
message GuessResponse {
	bool correct = 1;
	bool gameOver = 2;
	string result = 3;
	string included = 4;
	string excluded = 5;
	string unused = 6;
}